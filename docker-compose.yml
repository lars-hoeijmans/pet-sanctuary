services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sanctuary
      POSTGRES_PASSWORD: sanctuary
      POSTGRES_DB: pet_sanctuary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanctuary -d pet_sanctuary"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
